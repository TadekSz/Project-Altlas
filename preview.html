<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Atlas · Core Library</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #0e0f14;
    --ink-secondary: #555;
    --ink-tertiary: #888;
    --surface: #f4f3ef;
    --surface-raised: #ffffff;
    --surface-sunken: #eceae4;
    --rule: #d4d2cb;
    --mono: 'DM Mono', monospace;
    --serif: 'Instrument Serif', serif;
    --radius-md: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --ink: #f0efe9;
      --ink-secondary: #aaa;
      --ink-tertiary: #666;
      --surface: #141414;
      --surface-raised: #1e1e1e;
      --surface-sunken: #111;
      --rule: #2e2e2e;
    }
  }

  body {
    background: var(--surface);
    color: var(--ink);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    min-height: 100vh;
    padding: 40px 24px 80px;
  }

  /* ── Header ── */
  .page-header {
    max-width: 960px;
    margin: 0 auto 40px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 0.5px solid var(--rule);
    padding-bottom: 16px;
  }
  .page-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-tertiary);
  }
  .page-count {
    font-size: 11px;
    color: var(--ink-tertiary);
  }

  /* ── Color block ── */
  .color-block {
    max-width: 960px;
    margin: 0 auto 24px;
    border: 0.5px solid var(--rule);
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--surface-raised);
  }

  /* ── Hero ── */
  .hero {
    padding: 52px 44px 44px;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 12px;
  }
  .hero-name {
    font-family: var(--serif);
    font-style: italic;
    font-size: clamp(48px, 7vw, 84px);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .hero-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 22px;
  }
  .hero-tag {
    padding: 4px 10px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.15);
  }

  /* ── Meta bar ── */
  .meta-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px 28px;
    padding: 13px 44px;
    border-top: 0.5px solid rgba(0,0,0,0.08);
    border-bottom: 0.5px solid var(--rule);
    background: var(--surface-sunken);
  }
  .meta-item {
    font-size: 11px;
    color: var(--ink-tertiary);
  }
  .meta-item strong {
    color: var(--ink);
    font-weight: 500;
    margin-left: 5px;
  }

  /* ── Cards ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    padding: 24px 44px 36px;
  }
  .card {
    background: var(--surface-sunken);
    border-radius: var(--radius-md);
    padding: 16px;
  }
  .card-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-tertiary);
    margin-bottom: 8px;
  }
  .card-value {
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
  }
  .card-sub {
    font-size: 11px;
    color: var(--ink-secondary);
    margin-top: 4px;
  }

  /* ── States ── */
  .empty-state {
    max-width: 960px;
    margin: 0 auto;
    text-align: center;
    padding: 80px 24px;
    color: var(--ink-tertiary);
  }
  .error-chip {
    max-width: 960px;
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #fdf0f0;
    color: #8b2020;
    border: 0.5px solid #f0c0c0;
    padding: 12px 16px;
    border-radius: var(--radius-md);
    font-size: 12px;
  }
  @media (prefers-color-scheme: dark) {
    .error-chip { background: #2a1414; color: #f08080; border-color: #5a2020; }
  }
</style>
</head>
<body>

<header class="page-header">
  <span class="page-title">Project Atlas · Core Library</span>
  <span class="page-count" id="page-count"></span>
</header>

<div id="atlas-app"></div>

<script>
  // ── MANIFEST ──────────────────────────────────────────────
  // Add new JSON file paths here whenever you create a new color.
  const colorDatabase = [
    'colors/core-spectrum/ATL-405-88.json',
    'colors/core-spectrum/ATL-105-04.json',
  ];
  // ─────────────────────────────────────────────────────────

  const app = document.getElementById('atlas-app');
  const countEl = document.getElementById('page-count');

  function luminance(hex) {
    const r = parseInt(hex.slice(1, 3), 16) / 255;
    const g = parseInt(hex.slice(3, 5), 16) / 255;
    const b = parseInt(hex.slice(5, 7), 16) / 255;
    const toL = v => v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
    return 0.2126 * toL(r) + 0.7152 * toL(g) + 0.0722 * toL(b);
  }

  function heroTextColor(hex) {
    return luminance(hex) > 0.35 ? 'rgba(0,0,0,0.85)' : '#ffffff';
  }

  function card(label, value, sub) {
    return `
      <div class="card">
        <div class="card-label">${label}</div>
        <div class="card-value">${value}</div>
        ${sub ? `<div class="card-sub">${sub}</div>` : ''}
      </div>`;
  }

  function renderColor(c) {
    const hex = c.digital_translation.sRGB.hex;
    const fg  = heroTextColor(hex);
    const { r, g, b } = c.digital_translation.sRGB;
    const cmyk  = c.print_translation.cmyk_fogra39_coated;
    const oklch = c.core_identity_oklch;

    const block = document.createElement('div');
    block.className = 'color-block';
    block.innerHTML = `
      <div class="hero" style="background:${hex}; color:${fg};">
        <div class="hero-eyebrow">${c.metadata.author} · ${c.id}</div>
        <div class="hero-name">${c.name}</div>
        <div class="hero-tags">
          ${c.metadata.tags.map(t => `<span class="hero-tag" style="color:${fg};">${t}</span>`).join('')}
        </div>
      </div>

      <div class="meta-bar">
        <span class="meta-item">HEX <strong>${hex}</strong></span>
        <span class="meta-item">RGB <strong>${r}, ${g}, ${b}</strong></span>
        <span class="meta-item">Lightness <strong>${oklch.coordinates.L}</strong></span>
        <span class="meta-item">Chroma <strong>${oklch.coordinates.C}</strong></span>
      </div>

      <div class="cards">
        ${card('Digital · sRGB', hex, `rgb(${r}, ${g}, ${b})`)}
        ${card('Print · FOGRA39 coated', 'CMYK', `C${cmyk.c} M${cmyk.m} Y${cmyk.y} K${cmyk.k}`)}
        ${card('Modern CSS · OKLCH', oklch.css_value, `L ${oklch.coordinates.L} · C ${oklch.coordinates.C}`)}
      </div>
    `;
    return block;
  }

  function renderError(path, message) {
    const chip = document.createElement('div');
    chip.className = 'error-chip';
    chip.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Could not load <code style="margin: 0 4px;">${path}</code> — ${message}`;
    return chip;
  }

  async function renderAtlas() {
    let loaded = 0;

    for (const path of colorDatabase) {
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        app.appendChild(renderColor(data.color));
        loaded++;
        countEl.textContent = `${loaded} color${loaded === 1 ? '' : 's'}`;
      } catch (err) {
        app.appendChild(renderError(path, err.message));
      }
    }

    if (loaded === 0 && app.children.length === 0) {
      app.innerHTML = '<div class="empty-state">No color data found.</div>';
    }
  }

  renderAtlas();
</script>

</body>
</html>
